<!-- Login View -->
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Sign in</h1>
            <p>Stay updated on your professional world</p>
        </div>
        
        <div ng-show="message" class="alert" ng-class="{'alert-success': messageType === 'success', 'alert-error': messageType === 'error'}">
            {{message}}
        </div>

        <form ng-submit="login()">
            <div class="form-group">
                <input type="email" id="loginEmail" name="email" ng-model="formData.email" placeholder="Email" required>
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <input type="password" id="loginPassword" name="password" ng-model="formData.password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-primary" ng-disabled="loading" style="width: 100%; border-radius: 24px; padding: 14px;">
                <span ng-show="!loading">Sign in</span>
                <span ng-show="loading">Signing in...</span>
            </button>
        </form>

        <div class="auth-footer">
            New to JobSeeker? <a href="#/register">Join now</a>
        </div>
    </div>
</div>
