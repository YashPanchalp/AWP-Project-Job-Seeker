<!DOCTYPE html>
<html lang="en" ng-app="jobSeekerApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Application</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="#/home" class="navbar-brand">JobSeeker</a>
            <ul class="navbar-nav">
                <li ng-hide="isLoggedIn">
                    <a href="#/home">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M23 9v2h-2v7a3 3 0 01-3 3h-4v-6h-4v6H6a3 3 0 01-3-3v-7H1V9l11-7z"></path></svg>
                        Home
                    </a>
                </li>
                <li ng-show="currentUser.role === 'jobseeker'">
                    <a href="#/jobs">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M21 5h-4.5H16V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v1H7.5H3a1 1 0 00-1 1v14a2 2 0 002 2h16a2 2 0 002-2V6a1 1 0 00-1-1zM10 4h4v1h-4zM4 11h16v9H4zm0-4h16v2H4z"></path></svg>
                        Jobs
                    </a>
                </li>
                <li ng-show="currentUser.role === 'jobseeker'">
                    <a href="#/my-applications">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2a1 1 0 00-1 1v13.59l-3.3-3.3a1 1 0 00-1.4 1.42l5 5a1 1 0 001.4 0l5-5a1 1 0 00-1.4-1.42L13 16.59V3a1 1 0 00-1-1zM3 20h18v2H3z"></path></svg>
                        Applications
                    </a>
                </li>
                <li ng-show="currentUser.role === 'jobseeker'">
                    <a href="#/profile">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2a5 5 0 105 5 5 5 0 00-5-5zm0 8a3 3 0 113-3 3 3 0 01-3 3zm9 11v-1a7 7 0 00-7-7h-4a7 7 0 00-7 7v1h2v-1a5 5 0 015-5h4a5 5 0 015 5v1z"></path></svg>
                        Profile
                    </a>
                </li>
                <li ng-show="currentUser.role === 'admin'">
                    <a href="#/admin/dashboard">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M21 13h-8v8h8zM11 13H3v8h8zm10-10h-8v8h8zM11 3H3v8h8z"></path></svg>
                        Dashboard
                    </a>
                </li>
                <li ng-show="currentUser.role === 'admin'">
                    <a href="#/admin/post-job">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M21 13h-8v8h8zM11 13H3v8h8zm10-10h-8v8h8zM11 3H3v8h8z"></path></svg>
                        Post Job
                    </a>
                </li>
                <li ng-show="currentUser.role === 'admin'">
                    <a href="#/admin/profile">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2a5 5 0 105 5 5 5 0 00-5-5zm0 8a3 3 0 113-3 3 3 0 01-3 3zm9 11v-1a7 7 0 00-7-7h-4a7 7 0 00-7 7v1h2v-1a5 5 0 015-5h4a5 5 0 015 5v1z"></path></svg>
                        Profile
                    </a>
                </li>
                <li ng-show="isLoggedIn" style="display:flex; align-items:center; border-left:1px solid #e0e0e0; padding-left:15px;">
                    <span style="color: var(--li-text-dark); margin-right: 15px; font-weight:500;">{{currentUser.name}}</span>
                    <button class="btn btn-outline" style="padding: 6px 16px; min-height:0; border-radius:24px;" ng-click="logout()">Sign Out</button>
                </li>
                <li ng-hide="isLoggedIn" class="auth-buttons">
                    <a href="#/register" class="btn btn-secondary" style="border:none;">Join now</a>
                    <a href="#/login" class="btn btn-outline" style="border-radius:24px; padding:8px 24px; color:#0a66c2;">Sign in</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <ng-view></ng-view>
    </div>

    <!-- Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    
    <!-- App -->
    <script src="js/app.js"></script>
    
    <!-- Services -->
    <script src="js/services/auth.service.js"></script>
    <script src="js/services/job.service.js"></script>
    <script src="js/services/application.service.js"></script>
    <script src="js/services/profile.service.js"></script>
    
    <!-- Controllers -->
    <script src="js/controllers/home.controller.js"></script>
    <script src="js/controllers/auth.controller.js"></script>
    <script src="js/controllers/job.controller.js"></script>
    <script src="js/controllers/application.controller.js"></script>
    <script src="js/controllers/profile.controller.js"></script>
    <script src="js/controllers/admin.controller.js"></script>
    <script src="js/controllers/admin-profile.controller.js"></script>
    <script src="js/controllers/applicants.controller.js"></script>
</body>
</html>
